<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servexl IOT Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo brand-logo-upload"><img src="/static/uploads/logo.png" onerror="this.style.display='none';this.parentElement.classList.add('no-img')" alt="Logo"><span>SX</span></div>
            <div>
                <h2>Servexl IOT</h2>
                <p>Cloud Platform</p>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="/dashboard"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a>
            <a href="/customers"><i class="fa-solid fa-building-user"></i><span>Customers / Sites</span></a>
            <a href="/devices"><i class="fa-solid fa-microchip"></i><span>Devices / Tags</span></a>
            <a href="/mqtt-discovery"><i class="fa-solid fa-satellite-dish"></i><span>MQTT Discovery</span></a>
            <a href="/reports"><i class="fa-solid fa-file-excel"></i><span>Reports</span></a>
            <a href="/alerts"><i class="fa-solid fa-triangle-exclamation"></i><span>Alerts</span></a>
            <a href="/users"><i class="fa-solid fa-users-gear"></i><span>Users</span></a>
            <a href="/diagnostics"><i class="fa-solid fa-stethoscope"></i><span>Diagnostics</span></a>
            <a href="/settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        </nav>

        <div class="sidebar-footer">
            <div class="live-dot"><span></span> Live monitoring</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="search" placeholder="Search dashboard, devices, reports...">
            </div>
            <select id="themeSelect" class="theme-select" title="Change theme">
                <option value="aurora">Aurora</option>
                <option value="ocean">Ocean</option>
                <option value="midnight">Midnight</option>
                <option value="sunset">Sunset</option>
                <option value="forest">Forest</option>
                <option value="violet">Violet</option>
                <option value="graphite">Graphite</option>
            </select>
            <div class="user-chip">
                <span>{{ (user.name[0] if user and user.name else 'S') }}</span>
                <div>
                    <b>{{ user.name if user else 'System' }}</b>
                    <a href="/logout">Logout</a>
                </div>
            </div>
        </header>

        <section class="content-card">
            {% block content %}{% endblock %}
        </section>
    </main>
</div>

<script>
(function(){
    const saved = localStorage.getItem('sx_theme') || 'aurora';
    document.documentElement.setAttribute('data-theme', saved);
    const select = document.getElementById('themeSelect');
    if (select) {
        select.value = saved;
        select.addEventListener('change', function(){
            document.documentElement.setAttribute('data-theme', this.value);
            localStorage.setItem('sx_theme', this.value);
        });
    }
})();
</script>
</body>
</html>
