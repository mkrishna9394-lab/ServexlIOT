{% extends 'base.html' %}{% block content %}<h1>User Management</h1><form class="panel" method="post" action="/users/add"><input name="name" placeholder="Name"><input name="email" placeholder="Email"><input name="password" placeholder="Password"><select name="role_id">{% for r in roles %}<option value="{{r.id}}">{{r.name}}</option>{% endfor %}</select><select name="customer_id"><option value="">No customer</option>{% for c in customers %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select><button>Add User</button></form><div class="panel"><table>{% for u in users %}<tr><td>{{u.name}}</td><td>{{u.email}}</td><td>{{u.role.name if u.role else ''}}</td></tr>{% endfor %}</table></div>{% endblock %}
