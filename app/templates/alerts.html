{% extends 'base.html' %}{% block content %}<h1>Alerts & Events</h1><div class="panel"><table><tr><th>Time</th><th>Severity</th><th>Message</th><th>Status</th><th></th></tr>{% for a in alerts %}<tr><td>{{a.created_at}}</td><td>{{a.severity}}</td><td>{{a.message}}</td><td>{{a.status}}</td><td>{% if a.status=='active' %}<form method="post" action="/alerts/{{a.id}}/ack"><button>Acknowledge</button></form>{% endif %}</td></tr>{% endfor %}</table></div>{% endblock %}
