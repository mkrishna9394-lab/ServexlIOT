{% extends 'base.html' %}{% block content %}<h1>Customer & Site Management</h1><div class="two"><form class="panel" method="post" action="/customers/add"><h2>Add Customer</h2><input name="name" placeholder="Customer name"><input name="contact_email" placeholder="Email"><button>Add</button></form><form class="panel" method="post" action="/customers/site/add"><h2>Add Site</h2><select name="customer_id">{% for c in customers %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select><input name="name" placeholder="Site name"><input name="location" placeholder="Location"><button>Add</button></form></div><div class="panel"><table><tr><th>Customer</th><th>Email</th></tr>{% for c in customers %}<tr><td>{{c.name}}</td><td>{{c.contact_email}}</td></tr>{% endfor %}</table></div>{% endblock %}
